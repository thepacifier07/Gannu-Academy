<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Q&A Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>School Question & Answer Library</h1>
      <p>Select a class, subject, and chapter to view chapter-wise questions and answers.</p>
    </section>

    <section class="panel">
      <div class="selectors">
        <div>
          <label for="classSelect">Class</label>
          <select id="classSelect">
            <option value="">Select Class</option>
          </select>
        </div>
        <div>
          <label for="subjectSelect">Subject</label>
          <select id="subjectSelect" disabled>
            <option value="">Select Subject</option>
          </select>
        </div>
        <div>
          <label for="chapterSelect">Chapter</label>
          <select id="chapterSelect" disabled>
            <option value="">Select Chapter</option>
          </select>
        </div>
      </div>

      <div class="toolbar">
        <div class="breadcrumbs" id="breadcrumbs">No chapter selected</div>
        <div class="search-box">
          <label for="searchInput">Search in questions</label>
          <input id="searchInput" type="text" placeholder="Type a keyword..." disabled />
        </div>
      </div>
    </section>

    <section class="panel" id="contentPanel">
      <p class="status" id="status">Choose a class, subject, and chapter to load content.</p>
      <div id="chapterContent" hidden>
        <div class="chapter-head">
          <div>
            <h2 id="chapterTitle"></h2>
            <p class="chapter-meta" id="chapterMeta"></p>
          </div>
          <div class="pill" id="questionCount"></div>
        </div>
        <div class="qa-list" id="qaList"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
